@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0c0a0a;
  --card: #161212;
  --border: #2a2020;
  --text: #f0e8e8;
  --muted: #807070;

  --glow2: #ff6b5e;

html, body {

  overflow-x: hidden;
  overflow-y: auto;
}

body {

  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  min-height: 100dvh;
  position: relative;
  overflow-x: hidden;
}

/* ===== BACKGROUND PARTICLES ===== */
.bg-blur {
  position: fixed;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}

.bg-blur.a { width: 500px; height: 500px; background: var(--glow); top: -10%; left: -10%; }
.bg-blur.b { width: 400px; height: 400px; background: var(--glow2); bottom: -8%; right: -8%; }
.bg-blur.c { width: 300px; height: 300px; background: var(--glow3); top: 40%; left: 60%; opacity: 0.08; }

/* ===== MAIN LAYOUT ===== */
.container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 20px;
  width: 100%;
  max-width: 620px;
}

/* ===== BRANDING ===== */
.branding {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
  text-decoration: none;
  transition: opacity 0.2s;
}

.branding:hover { opacity: 0.8; }

.brand-text {
  font-size: 1.3em;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
}

.brand-a {
  color: #EF3124;
  font-weight: 900;
  font-size: 1.1em;
}



/* ===== WORLD TICKER ===== */
.world-ticker {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 22px;
  border-radius: 14px;
  border: 1px solid rgba(239,49,36,0.25);
  background: rgba(239,49,36,0.06);
  font-size: 0.72em;
  color: #fca5a5;
  letter-spacing: 0.02em;
  margin-bottom: 8px;
  white-space: normal;
  text-align: center;
  flex-wrap: wrap;
  justify-content: center;
  max-width: calc(100% - 16px);
}

.world-ticker .pulse {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #EF3124;
  box-shadow: 0 0 0 0 rgba(239,49,36,0.6);
  animation: pulse-ring 1.5s infinite;
}

@keyframes pulse-ring {
  0% { box-shadow: 0 0 0 0 rgba(239,49,36,0.5); }
  70% { box-shadow: 0 0 0 8px rgba(239,49,36,0); }
  100% { box-shadow: 0 0 0 0 rgba(239,49,36,0); }
}

.world-number {
  font-weight: 800;
  color: #ffd4d1;
  font-variant-numeric: tabular-nums;
}

/* ===== HEADER ===== */
.header-q {
  font-size: clamp(1em, 3.5vw, 1.3em);
  color: var(--muted);
  text-align: center;
  line-height: 1.4;
  margin-bottom: 2px;
}

/* ===== BIG NUMBER ===== */
.counter-display {
  position: relative;
  user-select: none;
}

.big-number {
  font-size: clamp(6em, 22vw, 11em);
  font-weight: 900;
  line-height: 1;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #f0e0e0 0%, #EF3124 50%, #ff6b5e 100%);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  transition: transform 0.08s;
  text-align: center;
  font-variant-numeric: tabular-nums;
}

.big-number.bump { transform: scale(1.06); }

/* ===== DESPAIR LEVEL ===== */
.despair-bar {
  width: 100%;
  max-width: 380px;
  margin: 4px auto 2px;
}

.despair-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.7em;
  color: var(--muted);
  margin-bottom: 5px;
}

.despair-track {
  height: 6px;
  border-radius: 99px;
  background: rgba(255,255,255,0.06);
  overflow: hidden;
}

.despair-fill {
  height: 100%;
  border-radius: 99px;
  width: 0%;
  transition: width 0.4s ease, background 0.4s;
  background: linear-gradient(90deg, #EF3124, #ff6b5e);
}

.despair-status {
  text-align: center;
  font-size: 0.85em;
  font-weight: 600;
  margin-top: 8px;
  min-height: 1.4em;
  transition: color 0.3s;
}

/* ===== THE BUTTON ===== */
.hit-btn {
  margin-top: 20px;
  width: 72px;
  height: 72px;
  border: 2px solid rgba(239,49,36,0.5);
  border-radius: 50%;
  background: linear-gradient(145deg, rgba(239,49,36,0.14), rgba(255,107,94,0.08));
  color: #ffd8d4;
  font-family: inherit;
  font-size: 1.3em;
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.2s, border-color 0.2s;
  display: grid;
  place-items: center;
  padding: 0;
}

.hit-btn:hover {
  border-color: rgba(239,49,36,0.8);
  box-shadow: 0 0 30px rgba(239,49,36,0.2);
}

.hit-btn:active {
  transform: scale(0.92);
}

/* ===== SARCASTIC QUOTE ===== */
.quote-box {
  min-height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 16px 20px;
  margin-top: 16px;
  border: 1px solid rgba(239,49,36,0.18);
  border-radius: 14px;
  background: rgba(239,49,36,0.04);
  width: 100%;
  max-width: 480px;
}

.quote-text {
  font-size: 0.92em;
  color: #e4c0bc;
  line-height: 1.55;
  font-style: italic;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.35s, transform 0.35s;
}

.quote-text.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ===== ACHIEVEMENTS ===== */
.achievement {
  position: fixed;
  top: 20px;
  right: 20px;
  background: var(--card);
  border: 1px solid rgba(239,49,36,0.35);
  border-radius: 14px;

.achievement.show { transform: translateX(0); }

.achievement .ach-icon { font-size: 1.6em; flex-shrink: 0; }

.achievement .ach-body { font-size: 0.78em; }
.achievement .ach-title { font-weight: 700; color: #ffd4d1; }
.achievement .ach-desc { color: var(--muted); margin-top: 2px; }

.float-num {
  position: fixed;
  font-weight: 800;
  font-size: 1.6em;
  color: rgba(239,49,36,0.5);
  pointer-events: none;
  z-index: 10;

}

@keyframes float-up {
  0%   { opacity: 0.8; transform: translateY(0) scale(1); }
  100% { opacity: 0;   transform: translateY(-120px) scale(0.6); }

/* ===== RESET ===== */
.reset-link {
  position: fixed;
  bottom: 16px;
  right: 20px;
  font-size: 0.68em;
  color: #3a3a4a;
  text-decoration: none;
  cursor: pointer;
  transition: color 0.2s;
  z-index: 5;

.reset-link:hover { color: var(--muted); }

/* ===== SCREEN SHAKE ===== */
.shake { animation: shake 0.3s ease; }
@keyframes shake {
  0%, 100% { transform: translate(0); }
  20% { transform: translate(-3px, 2px); }
  40% { transform: translate(3px, -2px); }
  60% { transform: translate(-2px, 1px); }
  80% { transform: translate(2px, -1px); }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 500px) {
  body { font-size: 18px; }
  .container { padding: 16px; gap: 4px; }
  .world-ticker { font-size: 0.68em; padding: 8px 14px; }
  .header-q { font-size: clamp(1em, 4.5vw, 1.3em); }
  .hit-btn { width: 80px; height: 80px; font-size: 1.4em; }
  .quote-box { margin-top: 14px; padding: 14px 16px; }
  .achievement { right: 10px; left: 10px; max-width: unset; }
}

  "После инцидента: «Root cause: insufficient vibe.» С этим не поспоришь.",
  "Новая должность в штатном расписании: Chief Vibe Officer. Подчиняется напрямую CEO.",

  "Бэклог: 200 задач. Приоритет: все «Vibe Critical». Сделано: 0.",
  "«Я не пишу баги. Я создаю неожиданные вайбы.» — мантра вайбкодера.",
  "Контрактор выставил счёт: «8 часов вайбкодинга, $200/час.» Результат: одна кнопка. Не работает.",
  "В комнате 10 менеджеров обсуждают вайбкодинг. За стеной один разработчик тихо пилит фичу руками.",

  "«Этот сервис написан на вайбкодинге.» — «Это не язык программирования.» — «Именно поэтому он не компилируется.»",
  "Пятничный деплой вайбкода. Понедельничный откат вайбкода. Классика.",
];

/* ===== DESPAIR LEVELS ===== */
const despairLevels = [
  { min: 0,  label: "Всё нормально. Пока.",              color: "#a3a3b8" },
  { min: 3,  label: "Лёгкое раздражение",                 color: "#a78bfa" },
  { min: 6,  label: "Глаз начинает дёргаться",            color: "#c084fc" },
  { min: 10, label: "Вздрагиваешь при слове на «В»",      color: "#e879f9" },
  { min: 15, label: "Хочется выключить Slack навсегда",    color: "#f472b6" },
  { min: 20, label: "Обнимаешь мануал по C++ и плачешь",  color: "#fb7185" },
  { min: 30, label: "Экзистенциальный кризис",             color: "#f97316" },
  { min: 40, label: "Серьёзно рассматриваешь пчеловодство", color: "#ef4444" },
  { min: 50, label: "Пора в лес. Без интернета. Навсегда.", color: "#dc2626" },
  { min: 75, label: "ТЫ И ЕСТЬ ВАЙБКОДИНГ",               color: "#ff0044" },
];

/* ===== ACHIEVEMENTS ===== */
const achievements = [
  { at: 1,   icon: "👶", title: "Первый контакт",          desc: "Добро пожаловать в ад." },
  { at: 5,   icon: "😤", title: "Это не случайность",      desc: "5 раз — это уже тренд." },
  { at: 10,  icon: "🫠", title: "Двузначное число",         desc: "Ты официально в зоне поражения." },
  { at: 15,  icon: "🔇", title: "Mute All",                 desc: "Наушники уже не спасают." },
  { at: 25,  icon: "📉", title: "Продуктивность: 0",       desc: "Ты больше считаешь вайбы, чем работаешь." },
  { at: 42,  icon: "🌌", title: "Ответ на всё",             desc: "42. Но вопрос был не тот." },
  { at: 50,  icon: "🏚️", title: "Отшельник",               desc: "Домик в тайге выглядит всё привлекательнее." },
  { at: 69,  icon: "😏", title: "Nice.",                     desc: "Ну ты понял." },
  { at: 100, icon: "💀", title: "Сотня",                    desc: "Ты — статистическая аномалия." },
  { at: 150, icon: "🐝", title: "Пчеловод",                 desc: "Пчёлы не говорят «вайбкодинг». Переезжай к ним." },
  { at: 200, icon: "👁️", title: "Вайб смотрит в тебя",     desc: "Когда смотришь в вайб — вайб смотрит в тебя." },
  { at: 500, icon: "🏆", title: "Легенда",                  desc: "500. Ты либо врёшь, либо работаешь в стартапе." },
];

/* ===== STATE ===== */
const STORAGE_KEY = 'vibecoding-despair';

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (s.day !== todayKey()) return null;
    return s;
  } catch { return null; }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    day: todayKey(),
    count: count,
    shownAchievements: [...shownAchievements],
  }));
}

let state = loadState();
let count = state ? state.count : 0;
let shownAchievements = new Set(state ? state.shownAchievements : []);
let lastQuoteIdx = -1;

/* ===== DOM ===== */
const bigNum = document.getElementById('bigNum');
const despairFill = document.getElementById('despairFill');
const despairPct = document.getElementById('despairPct');
const despairStatus = document.getElementById('despairStatus');
const quoteText = document.getElementById('quoteText');
const hitBtn = document.getElementById('hitBtn');
const achEl = document.getElementById('achievement');

/* ===== RENDER ===== */
function render() {
  bigNum.textContent = count;

  const maxDespair = 100;
  const pct = Math.min(100, Math.round((count / maxDespair) * 100));
  despairFill.style.width = pct + '%';
  despairPct.textContent = pct + '%';

  let level = despairLevels[0];
  for (const l of despairLevels) {
    if (count >= l.min) level = l;
  }
  despairStatus.textContent = level.label;
  despairStatus.style.color = level.color;
  despairFill.style.background = `linear-gradient(90deg, #a855f7, ${level.color})`;
}

/* ===== RANDOM QUOTE ===== */
function showQuote() {
  let idx;
  do { idx = Math.floor(Math.random() * quotes.length); } while (idx === lastQuoteIdx && quotes.length > 1);
  lastQuoteIdx = idx;

  quoteText.classList.remove('visible');
  setTimeout(() => {
    quoteText.textContent = quotes[idx];
    quoteText.classList.add('visible');
  }, 80);
}

/* ===== FLOAT +1 ===== */
function spawnFloat(x, y) {
  const el = document.createElement('div');
  el.className = 'float-num';
  el.textContent = '+1';
  el.style.left = (x - 12) + 'px';
  el.style.top = (y - 20) + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

/* ===== ACHIEVEMENT ===== */
let achTimer = null;

function showAchievement(a) {
  document.getElementById('achIcon').textContent = a.icon;
  document.getElementById('achTitle').textContent = a.title;
  document.getElementById('achDesc').textContent = a.desc;
  achEl.classList.add('show');

  if (achTimer) clearTimeout(achTimer);
  achTimer = setTimeout(() => achEl.classList.remove('show'), 3500);
}

/* ===== CLICK ===== */
function handleClick(e) {
  count++;
  saveState();
  render();
  showQuote();

  // bump animation
  bigNum.classList.add('bump');
  setTimeout(() => bigNum.classList.remove('bump'), 100);

  // float +1
  const rect = hitBtn.getBoundingClientRect();
  const fx = rect.left + rect.width * (0.3 + Math.random() * 0.4);
  const fy = rect.top - 10;
  spawnFloat(fx, fy);

  // screen shake at high counts
  if (count >= 30 && count % 5 === 0) {
    document.body.classList.add('shake');
    setTimeout(() => document.body.classList.remove('shake'), 300);
  }

  // achievements
  for (const a of achievements) {
    if (count === a.at && !shownAchievements.has(a.at)) {
      shownAchievements.add(a.at);
      saveState();
      showAchievement(a);
      break;
    }
  }
}

hitBtn.addEventListener('click', handleClick);

/* Keyboard: space or enter */
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    if (e.target === hitBtn || e.target === document.body) {
      e.preventDefault();
      hitBtn.click();
    }
  }
});

/* ===== RESET ===== */
document.getElementById('resetLink').addEventListener('click', () => {
  if (!confirm('Обнулить счётчик? Новый день — новые вайбы.')) return;
  count = 0;
  shownAchievements.clear();
  saveState();
  render();
  quoteText.classList.remove('visible');
});

/* ===== INIT ===== */
render();
if (count > 0) showQuote();
</script>
</body>
